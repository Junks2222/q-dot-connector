<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Dot Connector • v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .section { display: none; }
        .section.active { display: block; }
        .nav-active { color: #6366f1; border-bottom: 2px solid #6366f1; }
        .entry-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .entry-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-link text-white text-2xl"></i>
                    </div>
                    <div>
                        <span class="font-display text-3xl font-semibold tracking-tighter">Q•Connector</span>
                        <span class="text-[10px] text-zinc-500 block -mt-1">v1.2 • Seeded</span>
                    </div>
                </div>
                <div class="flex items-center gap-x-1 text-sm">
                    <button onclick="showSection('dashboard')" class="nav-btn px-4 py-2 rounded-xl hover:bg-zinc-900" id="nav-dashboard">Dashboard</button>
                    <button onclick="showSection('entries')" class="nav-btn px-4 py-2 rounded-xl hover:bg-zinc-900" id="nav-entries">Entries</button>
                    <button onclick="showSection('qdrops')" class="nav-btn px-4 py-2 rounded-xl hover:bg-zinc-900" id="nav-qdrops">Q Drops</button>
                    <button onclick="showSection('connections')" class="nav-btn px-4 py-2 rounded-xl hover:bg-zinc-900" id="nav-connections">Connections</button>
                </div>
                <button onclick="showAddModal()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-2xl flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> <span>New Entry</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div id="dashboard" class="section active">
            <div class="flex items-end justify-between mb-8">
                <div>
                    <h1 class="text-4xl font-semibold tracking-tighter">Intelligence Dashboard</h1>
                    <p class="text-zinc-400 mt-1">Seeded with your QAnon summary • May 2026</p>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                    <div><div class="text-3xl font-semibold" id="stat-total">12</div><div class="text-sm text-zinc-400">Total Entries</div></div>
                </div>
                <div class="stat-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                    <div><div class="text-3xl font-semibold" id="stat-connections">47</div><div class="text-sm text-zinc-400">Active Connections</div></div>
                </div>
                <div class="stat-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                    <div><div class="text-3xl font-semibold" id="stat-qdrops">4965</div><div class="text-sm text-zinc-400">Q Drops Loaded</div></div>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Recent Entries</h3>
                    <div id="recent-entries" class="space-y-3"></div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Key Themes</h3>
                    <div id="active-themes" class="space-y-2 text-sm"></div>
                </div>
            </div>
        </div>

        <div id="entries" class="section">
            <div class="flex justify-between mb-6">
                <h2 class="text-3xl font-semibold tracking-tight">All Entries</h2>
                <input id="search-input" type="text" placeholder="Search..." class="w-72 bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-2xl text-sm" onkeyup="filterEntries()">
            </div>
            <div id="entries-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="qdrops" class="section">
            <div class="flex justify-between mb-6">
                <h2 class="text-3xl font-semibold tracking-tight">All Q Drops (Qagg.news)</h2>
                <input id="qdrop-search" type="text" placeholder="Search..." class="w-80 bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-2xl text-sm" onkeyup="filterQDrops()">
            </div>
            <div id="qdrops-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[70vh] overflow-auto"></div>
        </div>

        <div id="connections" class="section">
            <h2 class="text-3xl font-semibold tracking-tight mb-6">Smart Connections</h2>
            <div id="connections-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]" onclick="if (event.target.id === 'add-modal') hideAddModal()">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-lg mx-4 p-6">
            <h3 class="font-semibold text-xl mb-5">New Entry</h3>
            <form id="add-form" onsubmit="addNewEntry(event)">
                <input type="text" id="entry-title" required placeholder="Title" class="w-full bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl text-sm mb-4">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="date" id="entry-date" class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                    <select id="entry-category" class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                        <option>Iran War</option><option>Accountability</option><option>Symbolic Signals</option><option>Dmitriev Posts</option><option>Energy/Monetary</option><option>Q Drops</option><option>Other</option>
                    </select>
                </div>
                <textarea id="entry-summary" rows="3" required placeholder="Summary" class="w-full bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl text-sm mb-4"></textarea>
                <input type="text" id="entry-tags" placeholder="Tags (comma)" class="w-full bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl text-sm">
                <div class="mt-6 flex gap-x-3">
                    <button type="button" onclick="hideAddModal()" class="flex-1 py-3 rounded-2xl border border-zinc-700 text-sm">Cancel</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white text-sm rounded-2xl font-medium">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]" onclick="if (event.target.id === 'detail-modal') hideDetailModal()">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-2xl mx-4 p-7" id="detail-content"></div>
    </div>

    <script>
        let entries = [];
        let qDrops = [];

        function loadData() {
            const saved = localStorage.getItem('qdot_entries');
            if (saved && JSON.parse(saved).length > 0) {
                entries = JSON.parse(saved);
            } else {
                // SEED DATA FROM YOUR SUMMARY
                entries = [
                    {id:1, title:"Khamenei killed in U.S./Israeli strikes", date:"2026-02-28", category:"Iran War", summary:"Supreme Leader Ali Khamenei killed. IRGC heavily degraded. Controlled disruption of Strait of Hormuz via $20B U.S. maritime insurance facility.", tags:["khamenei","iran","strikes","hormuz"], source:"", connections:[]},
                    {id:2, title:"China deploys naval task force to Hormuz", date:"2026-05-01", category:"Iran War", summary:"China deployed naval task force toward Hormuz. UAE left OPEC/OPEC+. U.S. defense partnership with Indonesia.", tags:["china","hormuz","opec"], source:"", connections:[]},
                    {id:3, title:"Dmitriev black swan + tsunami GIFs", date:"2026-03-04", category:"Dmitriev Posts", summary:"Crowned black swan + tsunami GIFs. '7 Waves of EU/UK Crisis Tsunami' (May–Dec 2026) ending in Awakening & Reset in 2027.", tags:["dmitriev","tsunami","reset"], source:"", connections:[]},
                    {id:4, title:"James Comey indicted", date:"2026-04-28", category:"Accountability", summary:"James Comey indicted on felony threat charges. Trump reposted 'THE STORM IS COMING'. SPLC indicted on 11 felony counts.", tags:["comey","storm","indictment"], source:"", connections:[]},
                    {id:5, title:"MK Ultra hearing + biolabs investigation", date:"2026-05-13", category:"Accountability", summary:"MK Ultra congressional hearing. Tulsi Gabbard investigating 40+ U.S.-funded biolabs in Ukraine. New Russia hoax indictments.", tags:["mkultra","biolabs","tulsi"], source:"", connections:[]},
                    {id:6, title:"Cole Allen / Chief AGI account", date:"2023-12-01", category:"Symbolic Signals", summary:"@HenryMa79561893 created Dec 2023 with 'Cole Allen' post, tuxedo Pepe, 'Time Machine Europe' header, username anagram to 'Chief AGI'.", tags:["coleallen","agi","symbolic"], source:"", connections:[]},
                    {id:7, title:"White House bee symbolism", date:"2026-05-01", category:"Symbolic Signals", summary:"White House '🐝🐝🐝' posts (Beekeeper symbolism). Baron Trump books persistent 'future proves past' claims.", tags:["bees","symbolic","baron"], source:"", connections:[]},
                    {id:8, title:"Q Drop #325 - Adam Schiff traitor", date:"2017-11-11", category:"Q Drops", summary:"'Adam Schiff is a traitor to our country… Leaker. NAT SEC. EVIL. Tick Tock.'", tags:["q325","schiff","traitor"], source:"", connections:[]},
                    {id:9, title:"Q Drop #947 - Iran next", date:"2018-03-15", category:"Q Drops", summary:"'Iran next []… BOOM!!!!!!!!!!!!!!!'", tags:["q947","iran","boom"], source:"", connections:[]},
                    {id:10, title:"Overall Assessment - Active execution phase", date:"2026-05-05", category:"Other", summary:"Strong alignment between geopolitical moves (Iran/Hormuz), legal accountability, symbolic signaling, and long-term reset goals.", tags:["assessment","reset","storm"], source:"", connections:[]}
                ];
                saveData();
            }
        }

        function saveData() { localStorage.setItem('qdot_entries', JSON.stringify(entries)); }

        async function loadFullQDrops() {
            try {
                const res = await fetch('https://qagg.news/json/qdrops.json');
                const data = await res.json();
                qDrops = data.map(d => ({id: d.dropnumber, date: d.date, text: d.message || '', keywords: (d.message || '').toLowerCase().split(/\s+/).filter(w => w.length > 3).slice(0,8)}));
                document.getElementById('qdrop-count').innerHTML = `${qDrops.length} drops from Qagg.news`;
                renderQDrops();
            } catch(e) { document.getElementById('qdrop-count').innerHTML = 'Offline mode'; }
        }

        function computeConnections(entry) {
            const connections = [];
            const entryWords = (entry.summary + ' ' + entry.tags.join(' ')).toLowerCase().split(/\s+/).filter(w => w.length > 3);
            const entryDate = new Date(entry.date);
            qDrops.forEach(drop => {
                let score = 0;
                const overlap = entryWords.filter(w => drop.keywords.includes(w)).length;
                score += overlap * 12;
                const days = Math.abs((entryDate - new Date(drop.date)) / (1000*3600*24));
                if (days < 30) score += 20;
                if (score > 30) connections.push({type:'qdrop', id:drop.id, score:Math.floor(score), reason:`${overlap} keywords + ${Math.round(days)}d`});
            });
            return connections.sort((a,b)=>b.score-a.score).slice(0,5);
        }

        function updateDashboard() {
            document.getElementById('stat-total').textContent = entries.length;
            const totalConns = entries.reduce((s,e)=>s+(e.connections?.length||0),0);
            document.getElementById('stat-connections').textContent = totalConns;
            const recent = document.getElementById('recent-entries');
            recent.innerHTML = entries.slice(0,4).map(e => `<div class="p-3 bg-zinc-950 rounded-2xl border border-zinc-800 cursor-pointer" onclick="showEntryDetail(${e.id})"><div class="font-medium text-sm">${e.title}</div><div class="text-xs text-zinc-500">${e.date}</div></div>`).join('');
        }

        function renderEntries(filtered=null) {
            const container = document.getElementById('entries-grid');
            container.innerHTML = '';
            (filtered || entries).forEach(entry => {
                const card = document.createElement('div');
                card.className = 'entry-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer';
                card.onclick = () => showEntryDetail(entry.id);
                card.innerHTML = `<div class="flex justify-between"><span class="px-3 py-1 text-xs rounded-full bg-red-500/20 text-red-400">${entry.category}</span><span class="text-xs text-zinc-500">${entry.date}</span></div><h4 class="font-semibold mt-2">${entry.title}</h4><p class="text-sm text-zinc-400 line-clamp-2 mt-1">${entry.summary}</p>`;
                container.appendChild(card);
            });
        }

        function filterEntries() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderEntries(entries.filter(e => e.title.toLowerCase().includes(term) || e.summary.toLowerCase().includes(term)));
        }

        function renderQDrops(filtered=null) {
            const container = document.getElementById('qdrops-grid');
            container.innerHTML = '';
            (filtered || qDrops).slice(0,60).forEach(drop => {
                const card = document.createElement('div');
                card.className = 'qdrop-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer';
                card.onclick = () => showQDropDetail(drop);
                card.innerHTML = `<div class="flex justify-between"><span class="font-mono text-xs px-2 py-px bg-violet-500/20 text-violet-300 rounded">Q#${drop.id}</span><span class="text-xs text-zinc-500">${drop.date}</span></div><div class="text-sm mt-3 line-clamp-3">${drop.text.substring(0,180)}...</div>`;
                container.appendChild(card);
            });
        }

        function filterQDrops() {
            const term = document.getElementById('qdrop-search').value.toLowerCase();
            renderQDrops(qDrops.filter(d => d.text.toLowerCase().includes(term) || d.id.toString().includes(term)));
        }

        function showQDropDetail(drop) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            content.innerHTML = `<div class="flex justify-between"><span class="font-mono text-lg">Q#${drop.id}</span><button onclick="hideDetailModal()"><i class="fa-solid fa-times text-xl"></i></button></div><div class="mt-6 text-sm">${drop.text}</div>`;
            modal.style.display = 'flex';
        }

        function showEntryDetail(id) {
            const entry = entries.find(e => e.id === id);
            if (!entry) return;
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            const connHTML = entry.connections && entry.connections.length > 0 ? entry.connections.map(c => `<div class="bg-zinc-950 p-3 rounded-2xl mb-2 text-sm"><div>Q#${c.id}</div><div class="text-xs text-zinc-400">${c.reason}</div></div>`).join('') : '<div class="text-zinc-400 text-sm">No connections yet.</div>';
            content.innerHTML = `<div class="flex justify-between"><span class="px-3 py-1 text-xs rounded-full bg-red-500/20 text-red-400">${entry.category}</span><button onclick="hideDetailModal()"><i class="fa-solid fa-times"></i></button></div><h3 class="text-2xl font-semibold mt-3">${entry.title}</h3><div class="text-sm mt-4">${entry.summary}</div><div class="mt-6"><div class="font-semibold mb-2 text-sm">Connections</div>${connHTML}</div>`;
            modal.style.display = 'flex';
        }

        function hideDetailModal() { document.getElementById('detail-modal').style.display = 'none'; }

        function addNewEntry(e) {
            e.preventDefault();
            const newEntry = {id:Date.now(), title:document.getElementById('entry-title').value, date:document.getElementById('entry-date').value, category:document.getElementById('entry-category').value, summary:document.getElementById('entry-summary').value, tags:document.getElementById('entry-tags').value.split(',').map(t=>t.trim()).filter(Boolean), connections:[]};
            newEntry.connections = computeConnections(newEntry);
            entries.unshift(newEntry);
            saveData();
            hideAddModal();
            updateDashboard();
            renderEntries();
        }

        function showAddModal() {
            document.getElementById('add-modal').style.display = 'flex';
            document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
        }
        function hideAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        function updateConnectionsView() {
            const container = document.getElementById('connections-list');
            container.innerHTML = entries.slice(0,6).map(e => `<div class="p-4 bg-zinc-950 border border-zinc-800 rounded-2xl">${e.title} — ${e.connections?.length || 0} links</div>`).join('');
        }

        function showSection(s) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('nav-' + s).classList.add('nav-active');
            if (s === 'connections') updateConnectionsView();
        }

        async function initializeApp() {
            loadData();
            entries.forEach(e => { if (!e.connections || e.connections.length === 0) e.connections = computeConnections(e); });
            saveData();
            await loadFullQDrops();
            updateDashboard();
            renderEntries();
            updateConnectionsView();
            document.getElementById('nav-dashboard').classList.add('nav-active');
            console.log('%c[Q Dot Connector v1.2] Seeded with your summary + full Q drops.', 'color:#666');
        }
        window.onload = initializeApp;
    </script>
</body>
</html>
